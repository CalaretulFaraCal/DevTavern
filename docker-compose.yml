version: '3.8'

services:
  # Container 1: Baza de date SQL Server
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: devtavern-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Password123
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - devtavern-network

  # Container 2: API-ul C# (.NET 8)
  api:
    build:
      context: ./DevTavern.Server
      dockerfile: Dockerfile
    container_name: devtavern-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=DevTavernDb;User Id=sa;Password=YourStrong!Password123;TrustServerCertificate=True;
    ports:
      - "5114:8080"
    depends_on:
      - sqlserver
    networks:
      - devtavern-network

volumes:
  sqlserver-data:

networks:
  devtavern-network:
    driver: bridge